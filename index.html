<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ash // CS Student & Admin Specialist</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .neon-border { border: 2px solid #db2777; box-shadow: 0 0 15px rgba(219, 39, 119, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
       const { useState, useEffect } = React;

function Portfolio() {
    const [projects, setProjects] = useState([]);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        fetch('./data.json')
            .then(response => response.json())
            .then(data => {
                setProjects(data.projects);
                setLoading(false);
            })
            .catch(error => console.error('Error loading data:', error));
    }, []);

    if (loading) return <div className="text-pink-500 font-mono p-10">SYSTEM LOADING...</div>;

            return (
                <div className="min-h-screen p-8 max-w-5xl mx-auto">
                    {/* Header Section */}
                    <header className="mb-16 border-b-2 border-pink-600 pb-8 text-center md:text-left">
                        <h1 className="text-pink-500 font-black text-5xl italic tracking-tighter mb-2">ASHLEY ALCANTAR-GOLSARRY</h1>
                        <p className="text-gray-400 font-mono tracking-widest uppercase text-sm">
                            Healthcare Admin & Phlebotomist // Computer Science Student
                        </p>
                         <nav className="mt-6 flex gap-4 justify-center md:justify-start">
    <a href="blog.html" className="neon-border px-6 py-2 rounded-full text-xs font-black text-pink-500 tracking-widest uppercase hover:bg-pink-600 hover:text-white transition-all">
        Read the Blog
    </a>
</nav>
                    </header>

                    {/* Projects Grid */}
                    <main>
                        <h2 className="text-2xl font-bold mb-8 italic text-white flex items-center gap-3">
                            <span className="w-3 h-3 bg-pink-500 rounded-full animate-pulse"></span>
                            Project Gallery
                        </h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            {projects.map((project, index) => (
                                <a key={index} href={project.link} className="block group">
                                    <div className="neon-border bg-gray-900/30 p-8 rounded-[2rem] h-full transition-all group-hover:scale-[1.02] group-hover:bg-gray-900/50">
                                        <div className="flex gap-2 mb-4">
                                            {project.tags.map(tag => (
                                                <span key={tag} className="text-[10px] bg-pink-600/20 text-pink-400 px-2 py-1 rounded-full font-bold uppercase tracking-tighter">
                                                    {tag}
                                                </span>
                                            ))}
                                        </div>
                                        <h3 className="text-xl font-black text-white mb-3 italic uppercase">{project.title}</h3>
                                        <p className="text-gray-400 text-sm leading-relaxed">{project.desc}</p>
                                        <div className="mt-6 text-pink-500 font-black text-xs tracking-widest uppercase flex items-center gap-2">
                                            Launch Project <span>→</span>
                                        </div>
                                    </div>
                                </a>
                            ))}
                        </div>
                    </main>

                    {/* Footer / Blog Link */}
                    <footer className="mt-20 text-center text-gray-600 text-xs font-mono uppercase tracking-[0.3em]">
                        System v1.0 // Built with React & Neon
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Portfolio />);
    </script>
</body>
</html>
