<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ash // Dev Blog</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; }
        .neon-border { border: 2px solid #db2777; box-shadow: 0 0 15px rgba(219, 39, 119, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #db2777; border-radius: 10px; }
    </style>
</head>
<body class="p-8">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function Blog() {
            const [posts] = useState([
                {
                    date: "April 22, 2026",
                    title: "Building Admin Prime: My First React Project",
                    content: "Today I tackled the challenge of building a custom dashboard for my work desk. I learned how to use CDNs to load React and Tailwind without installing anything on my work computer...",
                    category: "Coding"
                }
            ]);

            return (
                <div className="max-w-3xl mx-auto">
                    <nav className="mb-12 flex justify-between items-center border-b border-pink-600/30 pb-4">
                        <a href="index.html" className="text-pink-500 font-black italic hover:scale-105 transition-transform">← BACK TO HOME</a>
                        <span className="text-[10px] font-mono tracking-widest text-gray-500">SYSTEM LOG // BLOG</span>
                    </nav>

                    <header className="mb-16">
                        <h1 className="text-4xl font-black italic uppercase tracking-tighter text-white">The Admin Log</h1>
                        <p className="text-gray-400 mt-2 italic font-mono">Documenting the journey from healthcare admin to software engineer.</p>
                    </header>

                    <div className="space-y-12">
                        {posts.map((post, index) => (
                            <article key={index} className="neon-border p-8 rounded-[2rem] bg-gray-900/20">
                                <div className="flex justify-between items-center mb-4">
                                    <span className="text-pink-500 font-mono text-xs font-bold tracking-widest">{post.date}</span>
                                    <span className="bg-gray-800 text-gray-400 px-3 py-1 rounded-full text-[10px] uppercase font-bold">{post.category}</span>
                                </div>
                                <h2 className="text-2xl font-black italic uppercase mb-4 text-white">{post.title}</h2>
                                <p className="text-gray-300 leading-relaxed mb-6 font-light">{post.content}</p>
                                <button className="text-pink-500 font-black text-xs tracking-widest uppercase hover:translate-x-2 transition-transform italic">
                                    Read Full Entry →
                                </button>
                            </article>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Blog />);
    </script>
</body>
</html>
